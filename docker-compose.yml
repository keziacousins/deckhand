# Deckhand — full stack.
# `docker compose up -d` starts everything: app, databases, auth, object storage, reverse proxy.

services:
  # --- Reverse Proxy ---

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${TLS_CERT_DIR:-./nginx/certs}:/etc/nginx/certs:ro
    depends_on:
      - app
      - hydra
    restart: unless-stopped

  # --- App ---

  app:
    build: .
    environment:
      PORT: "3008"
      DATABASE_URL: postgresql://${DECKHAND_DB_USER:-deckhand}:${DECKHAND_DB_PASSWORD:-deckhand}@deckhand-postgres:5432/${DECKHAND_DB_NAME:-deckhand}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-deckhand-assets}
      S3_REGION: ${S3_REGION:-us-east-1}
      PUBLIC_URL: ${PUBLIC_URL:-https://localhost}
      KRATOS_URL: http://kratos:4433
      KRATOS_ADMIN_URL: http://kratos:4434
      HYDRA_URL: http://hydra:4444
      HYDRA_ADMIN_URL: http://hydra:4445
      CORS_ORIGINS: ${PUBLIC_URL:-https://localhost}
    depends_on:
      deckhand-postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    restart: unless-stopped

  # --- Databases ---

  ory-postgres:
    build: ./ory/postgres
    environment:
      POSTGRES_USER: ${ORY_DB_USER:-ory}
      POSTGRES_PASSWORD: ${ORY_DB_PASSWORD:-ory}
      POSTGRES_DB: ory
    ports:
      - "${ORY_DB_PORT:-5434}:5432"
    volumes:
      - ory-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORY_DB_USER:-ory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  deckhand-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DECKHAND_DB_USER:-deckhand}
      POSTGRES_PASSWORD: ${DECKHAND_DB_PASSWORD:-deckhand}
      POSTGRES_DB: ${DECKHAND_DB_NAME:-deckhand}
    ports:
      - "${DECKHAND_DB_PORT:-5433}:5432"
    volumes:
      - deckhand-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DECKHAND_DB_USER:-deckhand}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Ory Kratos (Identity) ---

  kratos-migrate:
    build: ./ory/kratos
    command: migrate sql -e --yes
    environment:
      DSN: postgres://${ORY_DB_USER:-ory}:${ORY_DB_PASSWORD:-ory}@ory-postgres:5432/kratos?sslmode=disable
    depends_on:
      ory-postgres:
        condition: service_healthy
    restart: "no"

  kratos:
    build: ./ory/kratos
    command: serve -c /etc/kratos/kratos.yml --dev --watch-courier
    environment:
      DSN: postgres://${ORY_DB_USER:-ory}:${ORY_DB_PASSWORD:-ory}@ory-postgres:5432/kratos?sslmode=disable
      SECRETS_COOKIE: ${KRATOS_COOKIE_SECRET:-CHANGE-ME-IN-PRODUCTION-KRATOS-COOKIE-SECRET}
      SECRETS_CIPHER: ${KRATOS_CIPHER_SECRET:-change-me-in-prod-32-char-key!!!}
      SERVE_PUBLIC_BASE_URL: ${KRATOS_PUBLIC_URL:-http://localhost:4433}/
      SERVE_ADMIN_BASE_URL: ${KRATOS_ADMIN_URL:-http://localhost:4434}/
      DECKHAND_API_URL: http://app:3008
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # --- Ory Hydra (OAuth2 / JWT) ---

  hydra-migrate:
    build: ./ory/hydra
    command: migrate sql -e --yes
    environment:
      DSN: postgres://${ORY_DB_USER:-ory}:${ORY_DB_PASSWORD:-ory}@ory-postgres:5432/hydra?sslmode=disable
    depends_on:
      ory-postgres:
        condition: service_healthy
    restart: "no"

  hydra:
    build: ./ory/hydra
    command: serve all -c /etc/hydra/hydra.yml --dev
    environment:
      DSN: postgres://${ORY_DB_USER:-ory}:${ORY_DB_PASSWORD:-ory}@ory-postgres:5432/hydra?sslmode=disable
      SECRETS_SYSTEM: ${HYDRA_SYSTEM_SECRET:-CHANGE-ME-IN-PRODUCTION-HYDRA-SYSTEM-SECRET!}
      URLS_SELF_ISSUER: ${PUBLIC_URL:-https://localhost}
      SERVE_COOKIES_SAME_SITE_MODE: Lax
      URLS_LOGIN: ${PUBLIC_URL:-https://localhost}/api/auth/login
      URLS_CONSENT: ${PUBLIC_URL:-https://localhost}/api/auth/consent
      URLS_LOGOUT: ${PUBLIC_URL:-https://localhost}/api/auth/logout
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: ${PUBLIC_URL:-https://localhost}
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # --- SeaweedFS (Object Storage) ---

  seaweedfs:
    build: ./ory/seaweedfs
    command: server -s3 -filer -dir=/data -s3.config=/etc/seaweedfs/s3.json
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8333/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --- One-shot init: register OAuth2 client ---

  hydra-client-init:
    build: ./ory/scripts
    environment:
      HYDRA_ADMIN_URL: http://hydra:4445
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:5178}
      OAUTH2_CLIENT_ID: ${OAUTH2_CLIENT_ID:-deckhand-editor}
    depends_on:
      hydra:
        condition: service_started
    restart: "no"

volumes:
  ory-postgres-data:
  deckhand-postgres-data:
  seaweedfs-data:
