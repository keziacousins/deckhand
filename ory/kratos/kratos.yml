version: v1.3.0

dsn: postgres://ory:ory@ory-postgres:5432/kratos?sslmode=disable

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:5178
      allowed_methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type
        - Cookie
        - X-Session-Token
      exposed_headers:
        - Set-Cookie
      allow_credentials: true
  admin:
    base_url: http://localhost:4434/

identity:
  default_schema_id: user
  schemas:
    - id: user
      url: file:///etc/kratos/identity.schema.json

selfservice:
  default_browser_return_url: http://localhost:5178/

  flows:
    registration:
      enabled: true
      ui_url: http://localhost:5178/signup
      after:
        password:
          hooks:
            - hook: web_hook
              config:
                url: ${DECKHAND_API_URL:-http://host.docker.internal:3008}/api/auth/hooks/registration
                method: POST
                body: file:///etc/kratos/webhook.registration.jsonnet
                response:
                  ignore: true
                can_interrupt: false

    login:
      ui_url: http://localhost:5178/login

    recovery:
      enabled: true
      ui_url: http://localhost:5178/forgot-password
      use: code

    verification:
      enabled: false

    settings:
      ui_url: http://localhost:5178/settings

    error:
      ui_url: http://localhost:5178/auth-error

    logout:
      after:
        default_browser_return_url: http://localhost:5178/login

log:
  level: info
  format: text

secrets:
  cookie:
    - ${SECRETS_COOKIE:-CHANGE-ME-IN-PRODUCTION-KRATOS-COOKIE-SECRET}
  cipher:
    - ${SECRETS_CIPHER:-change-me-in-prod-32-char-key!!!}

hashers:
  argon2:
    parallelism: 1
    memory: 128MB
    iterations: 2
    salt_length: 16
    key_length: 16

courier:
  smtp:
    connection_uri: smtp://stub:1025/?disable_starttls=true
    from_address: noreply@deckhand.dev
    from_name: Deckhand
